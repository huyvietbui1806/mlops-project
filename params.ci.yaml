data:
  train_path: data/sample/sample_train.csv
  test_path: data/sample/sample_test.csv
  valid_size: 0.2
  train_log_path: data/processed/sample_train_log.parquet
  valid_log_path: data/processed/sample_valid_log.parquet
  test_log_path: data/processed/sample_test_log.parquet
  train_tree_path: data/processed/sample_train_tree.parquet
  valid_tree_path: data/processed/sample_valid_tree.parquet
  test_tree_path: data/processed/sample_test_tree.parquet

paths:
  reports_dir: reports/ci
  models_dir: models/ci

mlflow:
  tracking_uri: file:./mlruns

tune:
  n_trials: 2
  precision_floor: 0.65
  threshold_step: 0.01