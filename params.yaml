data:
  train_path: data/raw/train.csv
  test_path: data/raw/test.csv
  valid_size: 0.2
  train_log_path: data/processed/train_log.parquet
  valid_log_path: data/processed/valid_log.parquet
  test_log_path: data/processed/test_log.parquet
  train_tree_path: data/processed/train_tree.parquet
  valid_tree_path: data/processed/valid_tree.parquet
  test_tree_path: data/processed/test_tree.parquet

paths:
  reports_dir: reports/training
  models_dir: models

mlflow:
  tracking_uri: http://localhost:5555

tune:
  n_trials: 2
  precision_floor: 0.65
  threshold_step: 0.01