name: CT Pipeline

on:
  schedule:
    - cron: "0 0 * * 0"  # Retrain mỗi chủ nhật lúc 0AM UTC 
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
    branches: [ main ]
  workflow_dispatch:

jobs:
  continuous-training:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name != 'workflow_run' }}
    permissions:
      contents: write
      id-token: write

    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.LOCAL_AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.LOCAL_AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ap-southeast-1
      S3_BUCKET_NAME:         ${{ secrets.S3_BUCKET_NAME }}   

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Sync environment
        run: uv sync

      - name: Pull latest data from S3     
        run: |
          uv run dvc pull --allow-missing
      
      - name: Start MLflow server
        run: |
          uv run mlflow server \
            --backend-store-uri sqlite:///mlflow.db \
            --default-artifact-root ./mlruns \
            --host 0.0.0.0 \
            --port 5555 &
          sleep 5

      - name: Run full training pipeline
        run: |
          uv run dvc repro --force

      - name: Push to S3
        run: |
          uv run dvc push

      - name: Commit reports and meta back to Git # commit to Git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add reports/training/baseline_leaderboard.csv
          git add reports/training/best_model.json
          git add models/trained/trained_model_meta.json
          git add models/trained/tuning_pr_auc_by_trial.png
          git add dvc.lock
          git diff --cached --quiet || git commit -m "ct: retrain $(date +'%Y-%m-%d') [skip ci]"
          git push

      - name: Upload training reports as artifact
        uses: actions/upload-artifact@v4
        with:
          name: training-reports-${{ github.run_id }}
          path: |
            reports/training/baseline_leaderboard.csv
            reports/training/best_model.json
            models/trained/trained_model_meta.json
            models/trained/tuning_pr_auc_by_trial.png
          retention-days: 30