name: CT Pipeline

on:
  schedule:
    - cron: "0 0 * * 0"   # Retrain mỗi chủ nhật lúc 0AM UTC - cái này thay đổi được
  push:                     # Chạy khi có lệnh push vào nhánh main
    branches: [ main ]
    paths:                  # Chỉ trigger khi có thay đổi liên quan, có thể điều chỉnh thêm những files mà mình muốn chạy lại khi mấy files này thay đổi
      - "data/raw/**"
      - "src/**"
      - "configs/**"
      - "params.yaml"
  workflow_dispatch:

jobs:
  continuous-training:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.MLFLOW_AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.MLFLOW_AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: "ap-southeast-1"  # Thay đổi region thành Southeast Asia
      S3_BUCKET_NAME: "mlops-data-storage"
      S3_ARTIFACTS_PREFIX: "mlflow-artifacts"
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Create mlflow-artifacts directory if not exists
        run: |
          mkdir -p ./mlflow-artifacts
      - name: Set up AWS CLI
        run: |
          aws configure set aws_access_key_id ${{ secrets.MLFLOW_AWS_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.MLFLOW_AWS_SECRET_ACCESS_KEY }}
          aws configure set region ${{ secrets.AWS_DEFAULT_REGION }}
      - name: Sync with S3 bucket (for MLflow artifacts)
        run: |
          aws s3 sync ./mlflow-artifacts s3://$S3_BUCKET_NAME/$S3_ARTIFACTS_PREFIX --delete

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Sync environment
        run: uv sync

      - name: Pull latest data from S3     
        run: |
          uv run dvc pull data/raw/train.csv data/raw/test.csv

      - name: Start MLflow server
        run: |
          uv run mlflow server \
            --backend-store-uri sqlite:///mlflow.db \
            --default-artifact-root s3://${{ env.S3_BUCKET_NAME }}/mlflow-artifacts \
            --host 0.0.0.0 \
            --port 5555 &
          sleep 5

      - name: Run full training pipeline
        run: |
          uv run dvc repro --force

      - name: Push to S3
        run: |
          uv run dvc push

      - name: Commit reports and meta back to Git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add reports/training/baseline_leaderboard.csv
          git add reports/training/best_model.json
          git add models/trained/trained_model_meta.json
          git add dvc.lock
          git diff --cached --quiet || git commit -m "ct: retrain $(date +'%Y-%m-%d') [skip ci]"
          git push

      - name: Upload training reports as artifact
        uses: actions/upload-artifact@v4
        with:
          name: training-reports-${{ github.run_id }}
          path: |
            reports/training/baseline_leaderboard.csv
            reports/training/best_model.json
            models/trained/trained_model_meta.json
          retention-days: 30