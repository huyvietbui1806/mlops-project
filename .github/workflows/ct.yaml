name: CT Pipeline

on:
  schedule:
    - cron: "0 0 * * 0"   # Retrain mỗi chủ nhật lúc 0AM UTC
  push:
    branches: [ main ]
    paths:
      - "data/raw/**"
      - "src/**"
      - "configs/**"
      - "params.yaml"
  workflow_dispatch:

jobs:
  continuous-training:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.LOCAL_AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.LOCAL_AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION:    ap-southeast-1
      S3_BUCKET_NAME:        ${{ secrets.S3_BUCKET_NAME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Sync environment
        run: uv sync

      - name: Pull latest data from S3
        run: |
          uv run dvc pull data/raw/train.csv data/raw/test.csv

      # # ── Debug steps (có thể xoá sau khi confirm hoạt động) ──────────────
      # - name: Check AWS identity
      #   run: aws sts get-caller-identity

      # - name: Test S3 access (list)
      #   run: aws s3 ls s3://${{ env.S3_BUCKET_NAME }}

      # - name: Test S3 upload (PutObject)
      #   run: |
      #     echo "test" > test.txt
      #     aws s3 cp test.txt s3://${{ env.S3_BUCKET_NAME }}/mlflow-artifacts/test.txt
      # # ────────────────────────────────────────────────────────────────────

      - name: Start MLflow server
        # Export credentials tường minh để background process inherit đúng
        run: |
          export AWS_ACCESS_KEY_ID="${{ secrets.LOCAL_AWS_ACCESS_KEY_ID }}"
          export AWS_SECRET_ACCESS_KEY="${{ secrets.LOCAL_AWS_SECRET_ACCESS_KEY }}"
          export AWS_DEFAULT_REGION="ap-southeast-1"
          uv run mlflow server \
            --backend-store-uri sqlite:///mlflow.db \
            --default-artifact-root s3://${{ env.S3_BUCKET_NAME }}/mlflow-artifacts \
            --host 0.0.0.0 \
            --port 5555 &
          # Health check thay vì sleep cố định
          echo "Waiting for MLflow server to be ready..."
          timeout 60 bash -c 'until curl -sf http://localhost:5555/health; do sleep 2; done'
          echo "MLflow server is up."

      - name: Run full training pipeline
        run: |
          uv run dvc repro --force

      - name: Push artifacts to S3 (DVC)
        run: |
          uv run dvc push

      - name: Commit reports and meta back to Git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add reports/training/baseline_leaderboard.csv
          git add reports/training/best_model.json
          git add models/trained/trained_model_meta.json
          git add dvc.lock
          git diff --cached --quiet || git commit -m "ct: retrain $(date +'%Y-%m-%d') [skip ci]"
          git push

      - name: Upload training reports as artifact
        uses: actions/upload-artifact@v4
        with:
          name: training-reports-${{ github.run_id }}
          path: |
            reports/training/baseline_leaderboard.csv
            reports/training/best_model.json
            models/trained/trained_model_meta.json
          retention-days: 30