name: CD Pipeline

permissions:
  contents: read
  id-token: write

on:
  workflow_run:
    workflows: ["CT Pipeline"]
    types:
      - completed
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.LOCAL_AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.LOCAL_AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION:    ap-southeast-1
      S3_BUCKET_NAME:        ${{ secrets.S3_BUCKET_NAME }}
      # ← Đổi lại thành Docker Hub format
      IMAGE_NAME: ${{ secrets.TEST_DOCKERHUB_USERNAME }}/${{ secrets.TEST_DOCKERHUB_REPO }}

    outputs:
      image_tag: ${{ steps.vars.outputs.IMAGE_TAG }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Sync environment
        run: uv sync

      - name: Pull model artifacts from S3
        run: uv run dvc pull

      - name: Set image tag
        id: vars
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "IMAGE_TAG=${SHORT_SHA}" >> $GITHUB_OUTPUT

      # ← Bỏ GCP auth/configure-docker, thay bằng Docker Hub login
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.TEST_DOCKERHUB_USERNAME }}
          password: ${{ secrets.TEST_DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          platforms: linux/amd64,linux/arm64
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:latest

  deploy-to-gke:
    runs-on: ubuntu-latest
    needs: build-and-push

    env:
      IMAGE_NAME: ${{ secrets.TEST_DOCKERHUB_USERNAME }}/${{ secrets.TEST_DOCKERHUB_REPO }}
      IMAGE_TAG:  ${{ needs.build-and-push.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug GitHub context
        run: |
          echo "Repository: ${{ github.repository }}"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER_NAME }}
          location:     ${{ secrets.GCP_REGION }}

      # ← Bắt buộc phải có vì GKE không tự auth được Docker Hub
      - name: Create Docker Hub pull secret
        run: |
          kubectl create secret docker-registry dockerhub-secret \
            --docker-server=https://index.docker.io/v1/ \
            --docker-username=${{ secrets.TEST_DOCKERHUB_USERNAME }} \
            --docker-password=${{ secrets.TEST_DOCKERHUB_TOKEN }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Render & apply Deployment
        run: |
          sed "s|IMAGE_PLACEHOLDER|${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}|g" \
            deployment/k8s/deployment.yaml | kubectl apply -f -

      - name: Apply Service
        run: kubectl apply -f deployment/k8s/service.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/fraud-api-deployment --timeout=180s
        continue-on-error: true

      - name: Debug Pods
        run: |
          kubectl get pods -o wide
          kubectl describe pods
          kubectl logs --all-containers=true --tail=100

      - name: Show cluster status
        run: |
          echo "=== Pods ==="
          kubectl get pods -o wide
          echo "=== Services ==="
          kubectl get services
          echo "=== External IP ==="
          kubectl get service fraud-api-service \
            --output jsonpath='{.status.loadBalancer.ingress[0].ip}'