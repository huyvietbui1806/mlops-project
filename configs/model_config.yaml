experiment:
  name: fraud-model-selection
  target: is_fraud
  selection_metric: pr_auc
  register_best: true
  random_state: 42

resampling:
  use_smote: false
  random_state: 42

models:
  logistic_regression:
    enabled: true
    dataset: log
    params:
      max_iter: 300
      solver: liblinear
      class_weight: balanced
      random_state: 42

  xgboost:
    enabled: true
    dataset: tree
    params:
      n_estimators: 300
      max_depth: 6
      learning_rate: 0.05
      subsample: 0.8
      colsample_bytree: 0.8
      objective: binary:logistic
      eval_metric: logloss
      random_state: 42
      n_jobs: -1

  lightgbm:
    enabled: true
    dataset: tree
    params:
      n_estimators: 300
      max_depth: -1
      learning_rate: 0.05
      subsample: 0.8
      colsample_bytree: 0.8
      objective: binary
      random_state: 42
      n_jobs: -1

  catboost:
    enabled: true
    dataset: tree
    params:
      iterations: 300
      depth: 6
      learning_rate: 0.05
      loss_function: Logloss
      eval_metric: AUC
      random_seed: 42
      verbose: 0
