services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.11.1
    container_name: mlflow
    ports:
      - "5555:5555"
    volumes:
      - ./mlflow_data:/mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5555
      --backend-store-uri /mlflow
      --artifacts-destination /mlflow/artifacts