groups:
  - name: fraud_detection_model
    interval: 1m
    rules:

      # ===========================================
      # API HEALTH
      # ===========================================
      - alert: APIDown
        expr: up{job="fraud_api"} == 0
        for: 1m
        labels:
          severity: critical
          team: mlops
        annotations:
          summary: "Fraud Detection API is down"
          description: >
            The Fraud Detection API has been unreachable for more than 1 minute.
            Check container status: docker ps | grep fraud_api

      # ===========================================
      # DATA DRIFT
      # ===========================================
      - alert: ModelDriftWarning
        expr: model_drift_score > 0.3
        for: 5m
        labels:
          severity: warning
          team: mlops
        annotations:
          summary: "Model data drift detected (warning level)"
          description: >
            Drift score = {{ $value | printf "%.3f" }} > 0.3 threshold.
            Check drift report: GET /drift
            Drifted features: see latest report in reports/drift/

      - alert: ModelDriftCritical
        expr: model_drift_score > 0.5
        for: 5m
        labels:
          severity: critical
          team: mlops
        annotations:
          summary: "Model data drift is critical — retraining triggered"
          description: >
            Drift score = {{ $value | printf "%.3f" }} > 0.5 threshold.
            Auto-retraining has been triggered via alert webhook.

      - alert: DatasetDriftDetected
        expr: model_dataset_drift == 1
        for: 5m
        labels:
          severity: critical
          team: mlops
        annotations:
          summary: "Dataset-level drift confirmed by Evidently"
          description: >
            Evidently has flagged the overall dataset as drifted.
            Review features: model_drifted_features_count = {{ $value }}

      # ===========================================
      # FRAUD RATE ANOMALY
      # ===========================================
      - alert: FraudRateHigh
        expr: fraud_rate_recent > 0.5
        for: 5m
        labels:
          severity: warning
          team: mlops
        annotations:
          summary: "Fraud rate unusually high (>50%)"
          description: >
            Current fraud rate = {{ $value | printf "%.2f" }}.
            This may indicate a data drift or model issue.
            Investigate with GET /drift

      - alert: FraudRateLow
        expr: fraud_rate_recent < 0.001 and fraud_prediction_total > 100
        for: 10m
        labels:
          severity: warning
          team: mlops
        annotations:
          summary: "Fraud rate suspiciously low (<0.1%) — model may be broken"
          description: >
            After {{ $value }} total predictions, fraud rate is near zero.
            Model may not be scoring correctly.

      # ===========================================
      # PERFORMANCE DEGRADATION
      # ===========================================
      - alert: ModelF1Degraded
        expr: model_f1_score < 0.65
        for: 10m
        labels:
          severity: critical
          team: mlops
        annotations:
          summary: "Model F1 score below minimum threshold"
          description: >
            F1 score = {{ $value | printf "%.4f" }} < 0.65 minimum.
            Labeled samples: {{ model_labeled_samples_count }}
            Check evaluation: GET /evaluate

      - alert: ModelPrecisionLow
        expr: model_precision < 0.6
        for: 10m
        labels:
          severity: warning
          team: mlops
        annotations:
          summary: "Model precision dropped below 60%"
          description: >
            Precision = {{ $value | printf "%.4f" }}.
            High false positive rate — review model threshold.

      - alert: ModelRecallLow
        expr: model_recall < 0.6
        for: 10m
        labels:
          severity: warning
          team: mlops
        annotations:
          summary: "Model recall dropped below 60%"
          description: >
            Recall = {{ $value | printf "%.4f" }}.
            High false negative rate — frauds are being missed.

      # ===========================================
      # LATENCY
      # ===========================================
      - alert: HighPredictionLatency
        expr: histogram_quantile(0.95, rate(fraud_prediction_latency_seconds_bucket[5m])) > 1.0
        for: 5m
        labels:
          severity: warning
          team: mlops
        annotations:
          summary: "P95 prediction latency > 1 second"
          description: >
            P95 latency = {{ $value | printf "%.2f" }}s.
            May indicate model or infrastructure issue.
