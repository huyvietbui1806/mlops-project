global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: 'fraud-detection'
    environment: 'production'

# Alertmanager config
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Alert rules
rule_files:
  - /etc/prometheus/alerts.yml

# Scrape jobs
scrape_configs:
  # FastAPI /metrics endpoint
  - job_name: 'fraud_api'
    static_configs:
      - targets:
          - api:8000
    metrics_path: /metrics
    scrape_interval: 15s

  # Prometheus tự monitor
  - job_name: 'prometheus'
    static_configs:
      - targets:
          - localhost:9090
