services:
  # =====================
  # FastAPI — Fraud Detection API
  # =====================
  api:
    build:
      context: ../..        # project root
      dockerfile: Dockerfile
    container_name: fraud_api
    ports:
      - "8000:8000"
    volumes:
      - ../../logs:/app/logs           # persist prediction logs
      - ../../reports/drift:/app/reports/drift
      - ../../models:/app/models       # mount trained model
      - ../../data/raw:/app/data/raw   # reference data cho Evidently
    environment:
      - GITHUB_PAT=${GITHUB_PAT:-}
      - GITHUB_OWNER=${GITHUB_OWNER:-}
      - GITHUB_REPO=${GITHUB_REPO:-mlops-project}
      - GITHUB_BRANCH=${GITHUB_BRANCH:-main}
      - RETRAIN_WORKFLOW=${RETRAIN_WORKFLOW:-ct.yaml}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - monitoring

  # =====================
  # Prometheus — Metrics scraping
  # =====================
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - monitoring

  # =====================
  # Alertmanager — Alert routing
  # =====================
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - monitoring

  # =====================
  # Grafana — Dashboard
  # =====================
  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/fraud_detection.json
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - monitoring

# =====================
# Volumes & Networks
# =====================
volumes:
  prometheus_data:
  grafana_data:
  alertmanager_data:

networks:
  monitoring:
    driver: bridge
