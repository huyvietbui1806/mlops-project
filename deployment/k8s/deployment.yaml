apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-api-deployment
  labels:
    app: fraud-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fraud-api
  template:
    metadata:
      labels:
        app: fraud-api
    spec:
      serviceAccountName: fraud-api-ksa
      imagePullSecrets:
        - name: dockerhub-secret
      containers:
        - name: fraud-api
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: GCS_BUCKET_NAME
              value: fraud-detection-prediction
            - name: PREDICTION_PREFIX
              value: predictions
            - name: FEEDBACK_PREFIX
              value: feedbacks
            - name: APP_ENV
              value: staging
            - name: MODEL_VERSION
              value: v1.0.0
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10